<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Nick's Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f8f9fa;-webkit-tap-highlight-color:transparent;}
input,select,textarea,button{font-family:'Noto Sans KR',sans-serif;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}

/* 레이아웃 */
#app{max-width:480px;margin:0 auto;min-height:100vh;background:#f8f9fa;position:relative;}
.topbar{background:#fff;border-bottom:1px solid #f0f0f0;padding:12px 16px;display:flex;align-items:center;position:sticky;top:0;z-index:100;}
.topbar-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1a1a2e;flex:1;}
.topbar-date{font-size:13px;color:#aaa;}
.content{padding-bottom:70px;min-height:calc(100vh - 56px);}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #f0f0f0;display:flex;z-index:200;}
.navbtn{flex:1;padding:10px 4px 6px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
.navbtn-icon{font-size:20px;}
.navbtn-label{font-size:10px;color:#aaa;}
.navbtn.active .navbtn-label{color:#1a1a2e;font-weight:700;}
.navbtn-bar{width:20px;height:3px;background:#1a1a2e;border-radius:2px;display:none;}
.navbtn.active .navbtn-bar{display:block;}

/* 모달 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:flex-end;justify-content:center;}
.modal-box{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;padding-bottom:32px;}
.modal-header{padding:16px 20px 12px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:1;}
.modal-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1a1a2e;}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#888;line-height:1;}
.modal-body{padding:16px 20px;}

/* 공통 */
.btn{padding:10px 18px;border-radius:10px;border:none;cursor:pointer;font-weight:600;font-size:14px;}
.btn-primary{background:#1a1a2e;color:#fff;}
.btn-secondary{background:#f3f4f6;color:#374151;}
.btn-danger{background:#FEE2E2;color:#DC2626;}
.inp{font-size:14px;padding:10px 12px;border:1.5px solid #e5e7eb;border-radius:10px;outline:none;width:100%;background:#fafafa;}
.inp:focus{border-color:#3B82F6;}
textarea.inp{resize:vertical;min-height:70px;}
select.inp{cursor:pointer;}

/* 카드 */
.card{background:#fff;border-radius:12px;border:1.5px solid #e5e7eb;padding:12px;margin-bottom:8px;}
.row{display:flex;gap:8px;align-items:center;}
.col{display:flex;flex-direction:column;gap:8px;}
.tag{font-size:11px;padding:1px 8px;border-radius:20px;}
.catbtn{padding:6px 16px;border-radius:20px;border:2px solid;font-weight:600;font-size:13px;cursor:pointer;}

/* 달력 */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
.cal-day{padding:6px 2px;border-radius:8px;cursor:pointer;font-size:14px;position:relative;}
.cal-dot-row{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);display:flex;gap:2px;}
.cal-dot{width:4px;height:4px;border-radius:50%;}

/* 대시보드 */
.hero{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:28px 20px 22px;color:#fff;}
.hero-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;}
.hero-date{font-size:13px;opacity:.7;margin-top:4px;}
.summary-grid{padding:16px 16px 0;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.summary-card{background:#fff;border-radius:14px;padding:14px;cursor:pointer;}
.summary-icon{font-size:24px;}
.summary-val{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-top:4px;}
.summary-label{font-size:12px;color:#888;}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <span class="topbar-title">Nick's Planner</span>
    <span class="topbar-date" id="topDate"></span>
  </div>
  <div class="content" id="content"></div>
  <div class="bottomnav" id="bottomnav"></div>
</div>

<script>
// ── 유틸 ──
const SK='nicks_planner_v4';
const load=()=>{try{const s=localStorage.getItem(SK);return s?JSON.parse(s):null;}catch{return null;}};
const save=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){alert('저장 오류: '+e.message);}};
const pad=n=>String(n).padStart(2,'0');
const todayStr=()=>{const d=new Date();return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;};
const uid=()=>Math.random().toString(36).slice(2,10);
const fmtHour=h=>h===0?'오전 12시':h<12?`오전 ${h}시`:h===12?'오후 12시':`오후 ${h-12}시`;
const fmtTime=(h,m=0)=>`${fmtHour(h)}${m?` ${pad(m)}분`:''}`;
const durLabel=(sh,sm,eh,em)=>{const m=(eh*60+em)-(sh*60+sm);if(m<=0)return'';return(m>=60?`${Math.floor(m/60)}시간 `:'')+( m%60?`${m%60}분`:'');};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const HOUR_OPTS=Array.from({length:24},(_,i)=>i);
const SCHED_HOURS=Array.from({length:14},(_,i)=>i+7);
const CAT={업무:{bg:'#3B82F6',light:'#EFF6FF',text:'#1D4ED8'},개인:{bg:'#22C55E',light:'#F0FDF4',text:'#15803D'},취미:{bg:'#EAB308',light:'#FEFCE8',text:'#A16207'}};
const HTAGS=['재료 구매','현장 방문','목공 작업','기타'];
const OBTAGS=['골프','출사','산행','차박','기타'];

// ── 상태 ──
let state={schedules:{},plans:{},todos:[],golfDates:{},photoDates:{},photoGallery:[],woodworkDates:{}};
const saved=load();
if(saved){Object.assign(state,saved);}

function setState(updater){
  if(typeof updater==='function'){updater(state);}
  save(state);
  render();
}

// ── 현재 탭/뷰 상태 ──
let currentTab='home';
let schedDate=todayStr();
let planDate=todayStr();
let hobbyTab='골프';
let hobbyGallery=false;
let planViewYear=new Date().getFullYear();
let planViewMonth=new Date().getMonth();
let hobbyViewYear=new Date().getFullYear();
let hobbyViewMonth=new Date().getMonth();
let schedCalYear=new Date().getFullYear();
let schedCalMonth=new Date().getMonth();

// ── 모달 시스템 ──
function showModal(html, onMount){
  let overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal-box">${html}</div>`;
  overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  document.body.appendChild(overlay);
  if(onMount)onMount(overlay);
}
function closeModal(){
  const m=document.querySelector('.modal-overlay');
  if(m)m.remove();
}

// ── 사진 업로드 헬퍼 ──
function readPhotoFiles(input, cb){
  const files=Array.from(input.files);
  let results=[];
  let done=0;
  if(!files.length)return;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{results.push({id:uid(),dataUrl:ev.target.result});done++;if(done===files.length)cb(results);};
    r.readAsDataURL(f);
  });
}

// ── 달력 HTML 생성 ──
function calHTML(year, month, selDate, hasDots){
  const first=new Date(year,month,1).getDay();
  const dim=new Date(year,month+1,0).getDate();
  const cells=Array.from({length:first+dim},(_,i)=>i<first?null:i-first+1);
  while(cells.length%7!==0)cells.push(null);
  const mk=d=>`${year}-${pad(month+1)}-${pad(d)}`;
  const today=todayStr();
  let html=`
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <button onclick="calPrev()" style="background:none;border:none;font-size:22px;cursor:pointer;padding:4px 12px;">‹</button>
    <span style="font-family:'Playfair Display',serif;font-size:18px;font-weight:700;">${year}년 ${month+1}월</span>
    <button onclick="calNext()" style="background:none;border:none;font-size:22px;cursor:pointer;padding:4px 12px;">›</button>
  </div>
  <div class="cal-grid">`;
  ['일','월','화','수','목','금','토'].forEach((d,i)=>{
    html+=`<div style="font-size:12px;font-weight:700;color:${i===0?'#ef4444':i===6?'#3B82F6':'#888'};padding:4px 0;">${d}</div>`;
  });
  cells.forEach((d,i)=>{
    if(!d){html+='<div></div>';return;}
    const ds=mk(d);
    const isSel=ds===selDate;
    const isTd=ds===today;
    const isSun=i%7===0; const isSat=i%7===6;
    const hasSched=hasDots&&(state.schedules[ds]||[]).length>0;
    const hasPlan=hasDots&&(state.plans[ds]||[]).length>0;
    const bg=isSel?'#1a1a2e':isTd?'#e0e7ff':'transparent';
    const color=isSel?'#fff':isSun?'#ef4444':isSat?'#3B82F6':'#1a1a2e';
    const fw=isTd||isSel?700:400;
    html+=`<div class="cal-day" style="background:${bg};color:${color};font-weight:${fw};" onclick="calSelect('${ds}')">
      ${d}
      ${(hasSched||hasPlan)?`<div class="cal-dot-row">${hasSched?`<div class="cal-dot" style="background:#3B82F6;"></div>`:''} ${hasPlan?`<div class="cal-dot" style="background:#22C55E;"></div>`:''}</div>`:''}
    </div>`;
  });
  html+='</div>';
  return html;
}

// ── 달력 네비게이션 (전역 함수) ──
window.calPrev=function(){
  if(currentTab==='schedule'){if(schedCalMonth===0){schedCalMonth=11;schedCalYear--;}else schedCalMonth--;renderScheduleCal();}
  else if(currentTab==='plan'){if(planViewMonth===0){planViewMonth=11;planViewYear--;}else planViewMonth--;renderPlanCal();}
  else if(currentTab==='hobby'){if(hobbyViewMonth===0){hobbyViewMonth=11;hobbyViewYear--;}else hobbyViewMonth--;renderHobbyCal();}
};
window.calNext=function(){
  if(currentTab==='schedule'){if(schedCalMonth===11){schedCalMonth=0;schedCalYear++;}else schedCalMonth++;renderScheduleCal();}
  else if(currentTab==='plan'){if(planViewMonth===11){planViewMonth=0;planViewYear++;}else planViewMonth++;renderPlanCal();}
  else if(currentTab==='hobby'){if(hobbyViewMonth===11){hobbyViewMonth=0;hobbyViewYear++;}else hobbyViewMonth++;renderHobbyCal();}
};
window.calSelect=function(date){
  closeModal();
  if(currentTab==='schedule'){schedDate=date;}
  else if(currentTab==='plan'){planDate=date;}
  else if(currentTab==='hobby'){schedDate=date;}// hobby uses schedDate for selDate
  // For hobby tab
  if(currentTab==='hobby'){window._hobbySelDate=date;}
  render();
};

// ── 홈 대시보드 ──
function renderHome(){
  const td=todayStr();
  const todaySched=(state.schedules[td]||[]).sort((a,b)=>(a.startHour??a.hour)-(b.startHour??b.hour));
  const todoPending=state.todos.filter(t=>!t.done).length;
  const nextWeek=Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()+i+1);return`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;});
  let nextPlan=null;
  for(const dt of nextWeek){if(state.plans[dt]?.length){nextPlan={date:dt,...state.plans[dt][0]};break;}}

  let schedHTML='<div style="color:#aaa;font-size:13px;text-align:center;padding:12px 0;">오늘 등록된 일정이 없어요</div>';
  if(todaySched.length>0){
    schedHTML=todaySched.slice(0,4).map(s=>{
      const sh=s.startHour??s.hour; const sm=s.startMin??0;
      const dl=s.endHour!=null?durLabel(sh,sm,s.endHour,s.endMin??0):'';
      return`<div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;">
        <div style="flex-shrink:0;">
          <span style="font-size:11px;background:${CAT[s.category]?.light||'#f3f4f6'};color:${CAT[s.category]?.text||'#555'};padding:2px 8px;border-radius:20px;white-space:nowrap;display:block;">${esc(fmtTime(sh,sm))}${s.endHour!=null?'~'+esc(fmtTime(s.endHour,s.endMin??0)):''}</span>
          ${dl?`<span style="font-size:10px;color:#2563EB;display:block;text-align:center;">(${esc(dl)})</span>`:''}
        </div>
        <div style="flex:1;">
          <div style="font-size:14px;font-weight:600;color:#1a1a2e;">${esc(s.title)}</div>
          ${s.note?`<div style="font-size:12px;color:#888;margin-top:1px;">${esc(s.note)}</div>`:''}
        </div>
        <span style="width:10px;height:10px;border-radius:50%;background:${CAT[s.category]?.bg||'#ccc'};flex-shrink:0;margin-top:4px;display:inline-block;"></span>
      </div>`;
    }).join('');
  }

  return`<div class="hero">
    <div class="hero-title">Nick's Planner</div>
    <div class="hero-date">${new Date().toLocaleDateString('ko-KR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
  </div>
  <div class="summary-grid">
    <div class="summary-card" style="border:2px solid #3B82F220;box-shadow:0 2px 8px #3B82F615;" onclick="setTab('schedule')">
      <div class="summary-icon">📋</div>
      <div class="summary-val" style="color:#3B82F6;">${todaySched.length}개</div>
      <div class="summary-label">오늘 일정</div>
    </div>
    <div class="summary-card" style="border:2px solid #22C55E20;box-shadow:0 2px 8px #22C55E15;" onclick="setTab('todo')">
      <div class="summary-icon">✅</div>
      <div class="summary-val" style="color:#22C55E;">${todoPending}개</div>
      <div class="summary-label">남은 할 일</div>
    </div>
  </div>
  <div style="padding:12px 16px 0;">
    <div style="background:#fff;border-radius:16px;border:1.5px solid #f0f0f0;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);">
      <div style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1a1a2e;margin-bottom:10px;">📅 오늘의 일정</div>
      ${schedHTML}
    </div>
  </div>
  ${nextPlan?`<div style="padding:12px 16px 0;">
    <div style="background:linear-gradient(135deg,#0f3460,#533483);border-radius:16px;padding:14px 16px;color:#fff;">
      <div style="font-size:13px;opacity:.8;margin-bottom:4px;">📌 다음 주 주요 계획</div>
      <div style="font-weight:600;font-size:15px;">${esc(nextPlan.text)}</div>
      <div style="font-size:12px;opacity:.7;margin-top:4px;">${nextPlan.date}${nextPlan.startHour!=null?' · '+esc(fmtTime(nextPlan.startHour,nextPlan.startMin??0)):''}</div>
    </div>
  </div>`:''}`;
}

// ── 일정 뷰 ──
function renderSchedule(){
  const dayItems=state.schedules[schedDate]||[];
  let rows=SCHED_HOURS.map(h=>{
    const item=dayItems.find(i=>(i.startHour??i.hour)===h);
    const sh=item?(item.startHour??item.hour):h;
    const sm=item?(item.startMin??0):0;
    const dl=item&&item.endHour!=null?durLabel(sh,sm,item.endHour,item.endMin??0):'';
    const bg=item?(CAT[item.category]?.light||'#f9fafb'):'transparent';
    const border=item?(CAT[item.category]?.bg+'33'):'#f0f0f0';
    return`<div onclick="openSchedModal(${h})" style="display:flex;gap:10px;margin-bottom:4px;cursor:pointer;border-radius:12px;padding:8px 10px;background:${bg};border:1.5px solid ${border};transition:all .15s;">
      <div style="font-size:11px;color:#888;width:44px;flex-shrink:0;margin-top:2px;">${esc(fmtHour(h))}</div>
      ${item?`<div style="flex:1;">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <span style="width:8px;height:8px;border-radius:50%;background:${CAT[item.category]?.bg||'#ccc'};flex-shrink:0;display:inline-block;"></span>
          <span style="font-weight:600;font-size:14px;color:#1a1a2e;">${esc(item.title)}</span>
          <span style="margin-left:auto;font-size:11px;background:${CAT[item.category]?.bg||'#ccc'};color:#fff;padding:1px 7px;border-radius:20px;">${esc(item.category)}</span>
        </div>
        <div style="font-size:11px;color:#2563EB;margin-top:2px;padding-left:14px;">${esc(fmtTime(sh,sm))}${item.endHour!=null?' → '+esc(fmtTime(item.endHour,item.endMin??0)):''}${dl?' (⏱ '+esc(dl)+')':''}</div>
        ${item.note?`<div style="font-size:12px;color:#666;margin-top:1px;padding-left:14px;">${esc(item.note)}</div>`:''}
        ${item.alarm?`<div style="font-size:11px;color:#888;margin-top:1px;padding-left:14px;">🔔 ${esc(item.alarm)}</div>`:''}
      </div>`:`<div style="flex:1;font-size:13px;color:#ccc;">+ 일정 추가</div>`}
    </div>`;
  }).join('');

  return`<div style="padding:14px 16px 0;display:flex;gap:10px;align-items:center;">
    <input type="date" value="${schedDate}" onchange="schedDate=this.value;render();" style="flex:1;font-size:14px;padding:8px 12px;border:1.5px solid #e5e7eb;border-radius:10px;background:#fafafa;"/>
    <button class="btn btn-secondary" onclick="openSchedCal()" style="padding:8px 14px;">📅 달력</button>
  </div>
  <div style="padding:12px 16px 80px;">${rows}</div>`;
}

function renderScheduleCal(){
  const el=document.getElementById('schedCalBody');
  if(el)el.innerHTML=calHTML(schedCalYear,schedCalMonth,schedDate,true);
}

window.openSchedCal=function(){
  schedCalYear=new Date(schedDate).getFullYear()||new Date().getFullYear();
  schedCalMonth=new Date(schedDate).getMonth()||new Date().getMonth();
  showModal(`<div class="modal-header"><span class="modal-title">날짜 선택</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body"><div id="schedCalBody"></div></div>`,
    ()=>{document.getElementById('schedCalBody').innerHTML=calHTML(schedCalYear,schedCalMonth,schedDate,true);}
  );
};
window.calSelect=function(date){
  closeModal();
  if(currentTab==='schedule')schedDate=date;
  else if(currentTab==='plan')planDate=date;
  else if(currentTab==='hobby')window._hobbySelDate=date;
  render();
};

// ── 일정 모달 ──
window.openSchedModal=function(hour){
  const dayItems=state.schedules[schedDate]||[];
  const item=dayItems.find(i=>(i.startHour??i.hour)===hour)||null;
  const sh=item?.startHour??item?.hour??hour;
  const sm=item?.startMin??0;
  const eh=item?.endHour??Math.min(sh+1,23);
  const em=item?.endMin??0;
  const cat=item?.category||'업무';
  const photos=item?.photos||[];
  const mats=item?.materials||[];

  const hourOpts=HOUR_OPTS.map(h=>`<option value="${h}" ${h===sh?'selected':''}>${esc(fmtHour(h))}</option>`).join('');
  const ehOpts=HOUR_OPTS.map(h=>`<option value="${h}" ${h===eh?'selected':''}>${esc(fmtHour(h))}</option>`).join('');
  const minsOpts=[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}" ${m===sm?'selected':''}>${pad(m)}분</option>`).join('');
  const emOpts=[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}" ${m===em?'selected':''}>${pad(m)}분</option>`).join('');
  const catBtns=['업무','개인','취미'].map(c=>`<button type="button" onclick="schedSetCat('${c}')" id="catbtn_${c}" style="padding:6px 16px;border-radius:20px;border:2px solid ${CAT[c].bg};background:${cat===c?CAT[c].bg:'#fff'};color:${cat===c?'#fff':CAT[c].text};font-weight:600;font-size:13px;cursor:pointer;">${c}</button>`).join('');

  let photosHTML=photos.map((p,i)=>`<div style="position:relative;display:inline-block;">
    <img src="${p.dataUrl}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;border:2px solid #e5e7eb;"/>
    <button type="button" onclick="schedRemovePhoto(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;">×</button>
  </div>`).join('');

  let matsHTML=mats.map((m,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:7px;">
    <input type="checkbox" ${m.done?'checked':''} onchange="schedToggleMat(${i})" style="width:16px;height:16px;cursor:pointer;accent-color:#3B82F6;flex-shrink:0;"/>
    <span style="flex:1;font-size:13px;text-decoration:${m.done?'line-through':'none'};color:${m.done?'#aaa':'#1a1a2e'};">${esc(m.text)}</span>
    ${m.price?`<span style="font-size:13px;color:#16A34A;font-weight:700;flex-shrink:0;">$${parseFloat(m.price).toFixed(2)}</span>`:''}

window.schedUpdateDur=function(){
  const sh=parseInt(document.getElementById('sm_sh')?.value||0);
  const sm=parseInt(document.getElementById('sm_sm')?.value||0);
  const eh=parseInt(document.getElementById('sm_eh')?.value||0);
  const em=parseInt(document.getElementById('sm_em')?.value||0);
  const dl=durLabel(sh,sm,eh,em);
  const el=document.getElementById('sm_dur');
  if(el)el.textContent=dl?'⏱ 총 '+dl:'';
};

window.schedSetCat=function(c){
  window._schedModalState.cat=c;
  ['업무','개인','취미'].forEach(x=>{
    const b=document.getElementById('catbtn_'+x);
    if(b){b.style.background=x===c?CAT[x].bg:'#fff';b.style.color=x===c?'#fff':CAT[x].text;}
  });
  document.getElementById('sm_biz_section').style.display=c==='업무'?'block':'none';
  document.getElementById('sm_hobby_row').style.display=c==='취미'?'flex':'none';
};

window.schedSetHobby=function(t){
  window._schedModalState.hobbyType=t;
  ['골프','목공','사진'].forEach(x=>{
    const b=document.getElementById('hobbybtn_'+x);
    if(b){b.style.background=x===t?'#EAB308':'#fff';b.style.color=x===t?'#fff':'#A16207';}
  });
};

window.schedAddMat=function(){
  const nmat=document.getElementById('sm_nmat');
  const nprice=document.getElementById('sm_nprice');
  if(!nmat||!nmat.value.trim())return;
  window._schedModalState.mats.push({id:uid(),text:nmat.value.trim(),done:false,price:nprice?.value||''});
  nmat.value=''; if(nprice)nprice.value='';
  schedRenderMats();
};

window.schedToggleMat=function(i){
  window._schedModalState.mats[i].done=!window._schedModalState.mats[i].done;
  schedRenderMats();
};

window.schedRemoveMat=function(i){
  window._schedModalState.mats.splice(i,1);
  schedRenderMats();
};

function schedRenderMats(){
  const mats=window._schedModalState.mats;
  const el=document.getElementById('sm_matslist');
  if(!el)return;
  el.innerHTML=mats.map((m,i)=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:7px;">
    <input type="checkbox" ${m.done?'checked':''} onchange="schedToggleMat(${i})" style="width:16px;height:16px;cursor:pointer;accent-color:#3B82F6;flex-shrink:0;"/>
    <span style="flex:1;font-size:13px;text-decoration:${m.done?'line-through':'none'};color:${m.done?'#aaa':'#1a1a2e'};">${esc(m.text)}</span>
    ${m.price?`<span style="font-size:13px;color:#16A34A;font-weight:700;">$${parseFloat(m.price).toFixed(2)}</span>`:''}
    <button type="button" onclick="schedRemoveMat(${i})" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:16px;">×</button>
  </div>`).join('');
  const total=mats.reduce((s,m)=>s+(parseFloat(m.price)||0),0);
  let tw=document.getElementById('sm_total')||document.getElementById('sm_total_wrap');
  if(tw){
    if(mats.length>0){
      const parent=tw.parentElement;
      parent.innerHTML=`<div style="border-top:1.5px solid #DBEAFE;padding-top:8px;display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-size:13px;color:#64748b;">${mats.length}개 품목</span>
        <span id="sm_total" style="font-size:15px;font-weight:700;color:#1D4ED8;">합계: $${total.toFixed(2)}</span>
      </div>`;
    }
  }
}

window.schedAddPhotos=function(input){
  readPhotoFiles(input,results=>{
    window._schedModalState.photos.push(...results);
    const el=document.getElementById('sm_photos');
    if(el)el.innerHTML=window._schedModalState.photos.map((p,i)=>`<div style="position:relative;display:inline-block;">
      <img src="${p.dataUrl}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;border:2px solid #e5e7eb;"/>
      <button type="button" onclick="schedRemovePhoto(${i})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;">×</button>
    </div>`).join('');
  });
};

window.schedRemovePhoto=function(i){
  window._schedModalState.photos.splice(i,1);
  const el=document.getElementById('sm_photos');
  if(el)el.innerHTML=window._schedModalState.photos.map((p,j)=>`<div style="position:relative;display:inline-block;">
    <img src="${p.dataUrl}" style="width:70px;height:70px;object-fit:cover;border-radius:10px;border:2px solid #e5e7eb;"/>
    <button type="button" onclick="schedRemovePhoto(${j})" style="position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px;cursor:pointer;">×</button>
  </div>`).join('');
};

window.schedSave=function(){
  const ms=window._schedModalState;
  const title=document.getElementById('sm_title')?.value?.trim();
  if(!title){alert('제목을 입력해주세요!');return;}
  const sh=parseInt(document.getElementById('sm_sh')?.value||ms.sh);
  const sm2=parseInt(document.getElementById('sm_sm')?.value||ms.sm);
  const eh=parseInt(document.getElementById('sm_eh')?.value||ms.eh);
  const em=parseInt(document.getElementById('sm_em')?.value||ms.em);
  const note=document.getElementById('sm_note')?.value||'';
  const alarm=document.getElementById('sm_alarm')?.value||'';
  const cat=ms.cat;
  const newItem={
    id:ms.item?.id||uid(), hour:sh, startHour:sh, startMin:sm2, endHour:eh, endMin:em,
    title, note, category:cat, alarm,
    hobbyType:cat==='취미'?ms.hobbyType:undefined,
    clientInfo:cat==='업무'?{
      name:document.getElementById('sm_cname')?.value||'',
      phone:document.getElementById('sm_cphone')?.value||'',
      addr:document.getElementById('sm_caddr')?.value||'',
    }:undefined,
    materials:cat==='업무'?ms.mats:undefined,
    photos:ms.photos,
  };
  if(!state.schedules[schedDate])state.schedules[schedDate]=[];
  state.schedules[schedDate]=state.schedules[schedDate].filter(i=>(i.startHour??i.hour)!==sh);
  state.schedules[schedDate].push(newItem);
  closeModal(); setState(()=>{});
};

window.schedDelete=function(hour){
  if(!confirm('이 일정을 삭제할까요?'))return;
  if(state.schedules[schedDate]){
    state.schedules[schedDate]=state.schedules[schedDate].filter(i=>(i.startHour??i.hour)!==hour);
  }
  closeModal(); setState(()=>{});
};

// ── 계획 뷰 ──
function renderPlan(){
  const plans=state.plans[planDate]||[];
  const planItems=plans.map(p=>{
    const dl=p.startHour!=null&&p.endHour!=null?durLabel(p.startHour,p.startMin??0,p.endHour,p.endMin??0):'';
    return`<div class="card" style="display:flex;justify-content:space-between;align-items:flex-start;">
      <div style="flex:1;">
        <div style="font-size:14px;font-weight:600;color:#1a1a2e;">${esc(p.text)}</div>
        ${p.startHour!=null?`<div style="font-size:12px;color:#16A34A;margin-top:3px;font-weight:600;">🕐 ${esc(fmtTime(p.startHour,p.startMin??0))}${p.endHour!=null?' ~ '+esc(fmtTime(p.endHour,p.endMin??0)):''}${dl?' (⏱ '+esc(dl)+')':''}</div>`:''}
        ${p.alarm?`<div style="font-size:11px;color:#888;margin-top:3px;">🔔 ${esc(p.alarm)}</div>`:''}
      </div>
      <button onclick="deletePlan('${p.id}')" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:18px;margin-left:8px;">×</button>
    </div>`;
  }).join('');

  return`<div style="padding:12px 16px 80px;">
    <div id="planCalArea">${calHTML(planViewYear,planViewMonth,planDate,true)}</div>
    <div style="margin-top:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#1a1a2e;">${planDate} 계획</span>
        <button class="btn btn-primary" onclick="openPlanAdd()" style="padding:7px 14px;font-size:13px;">+ 추가</button>
      </div>
      ${plans.length===0?'<div style="color:#aaa;text-align:center;padding:20px 0;font-size:14px;">이 날의 계획이 없어요</div>':planItems}
    </div>
  </div>`;
}

window.calPrev=function(){
  if(currentTab==='schedule'){if(schedCalMonth===0){schedCalMonth=11;schedCalYear--;}else schedCalMonth--;const el=document.getElementById('schedCalBody');if(el)el.innerHTML=calHTML(schedCalYear,schedCalMonth,schedDate,true);}
  else if(currentTab==='plan'){if(planViewMonth===0){planViewMonth=11;planViewYear--;}else planViewMonth--;const el=document.getElementById('planCalArea');if(el)el.innerHTML=calHTML(planViewYear,planViewMonth,planDate,true);}
  else if(currentTab==='hobby'){if(hobbyViewMonth===0){hobbyViewMonth=11;hobbyViewYear--;}else hobbyViewMonth--;const el=document.getElementById('hobbyCalArea');if(el)el.innerHTML=calHTML(hobbyViewYear,hobbyViewMonth,window._hobbySelDate||todayStr(),false);}
};
window.calNext=function(){
  if(currentTab==='schedule'){if(schedCalMonth===11){schedCalMonth=0;schedCalYear++;}else schedCalMonth++;const el=document.getElementById('schedCalBody');if(el)el.innerHTML=calHTML(schedCalYear,schedCalMonth,schedDate,true);}
  else if(currentTab==='plan'){if(planViewMonth===11){planViewMonth=0;planViewYear++;}else planViewMonth++;const el=document.getElementById('planCalArea');if(el)el.innerHTML=calHTML(planViewYear,planViewMonth,planDate,true);}
  else if(currentTab==='hobby'){if(hobbyViewMonth===11){hobbyViewMonth=0;hobbyViewYear++;}else hobbyViewMonth++;const el=document.getElementById('hobbyCalArea');if(el)el.innerHTML=calHTML(hobbyViewYear,hobbyViewMonth,window._hobbySelDate||todayStr(),false);}
};

  <div class="modal-body"><div class="col">
    <textarea class="inp" id="pm_text" placeholder="계획을 입력하세요" style="min-height:80px;"></textarea>

        <select class="inp" id="pm_sh" style="width:auto;">${HOUR_OPTS.map(h=>`<option value="${h}" ${h===9?'selected':''}>${esc(fmtHour(h))}</option>`).join('')}</select>
        <select class="inp" id="pm_sm" style="width:auto;">${[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}">${pad(m)}분</option>`).join('')}</select>

        <select class="inp" id="pm_em" style="width:auto;">${[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}">${pad(m)}분</option>`).join('')}</select>

window.savePlan=function(){
  const text=document.getElementById('pm_text')?.value?.trim();
  if(!text){alert('계획을 입력해주세요!');return;}
  const sh=parseInt(document.getElementById('pm_sh')?.value||9);
  const sm=parseInt(document.getElementById('pm_sm')?.value||0);
  const eh=parseInt(document.getElementById('pm_eh')?.value||10);
  const em=parseInt(document.getElementById('pm_em')?.value||0);
  const alarm=document.getElementById('pm_alarm')?.value||'';
  if(!state.plans[planDate])state.plans[planDate]=[];
  state.plans[planDate].push({id:uid(),text,startHour:sh,startMin:sm,endHour:eh,endMin:em,alarm});
  closeModal(); setState(()=>{});
};

window.deletePlan=function(id){
  if(!confirm('이 계획을 삭제할까요?'))return;
  if(state.plans[planDate])state.plans[planDate]=state.plans[planDate].filter(p=>p.id!==id);
  setState(()=>{});
};

// ── 할 일 뷰 ──
function renderTodo(){
  const todos=[...state.todos].sort((a,b)=>(a.done===b.done)?0:a.done?1:-1);
  const items=todos.map(t=>`<div class="card" style="display:flex;gap:10px;align-items:flex-start;opacity:${t.done?.5:1};">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTodo('${t.id}')" style="width:18px;height:18px;cursor:pointer;margin-top:2px;accent-color:#1a1a2e;flex-shrink:0;"/>
    <div style="flex:1;">
      <div style="font-size:14px;font-weight:500;color:#1a1a2e;text-decoration:${t.done?'line-through':'none'};">${esc(t.text)}</div>
      <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
        ${t.category?`<span class="tag" style="background:${CAT[t.category]?.light};color:${CAT[t.category]?.text};">${esc(t.category)}</span>`:''}
        ${t.tag?`<span class="tag" style="background:#f3f4f6;color:#555;">#${esc(t.tag)}</span>`:''}
      </div>
      ${t.dueDate?`<div style="font-size:11px;color:#7C3AED;margin-top:3px;font-weight:600;">📅 ${esc(t.dueDate)}${t.dueHour!=null?' · '+esc(fmtTime(t.dueHour,t.dueMin??0)):''}</div>`:''}
      ${t.alarm?`<div style="font-size:11px;color:#888;margin-top:2px;">🔔 ${esc(t.alarm)}</div>`:''}
    </div>
    <button onclick="deleteTodo('${t.id}')" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:18px;">×</button>
  </div>`).join('');

  return`<div style="padding:12px 16px 80px;">
    <div style="background:#fff;border-radius:16px;border:1.5px solid #e5e7eb;padding:14px;margin-bottom:14px;">
      <button class="btn btn-primary" onclick="openTodoAdd()" style="width:100%;margin-bottom:0;">+ 할 일 추가</button>
    </div>
    ${todos.length===0?'<div style="color:#aaa;text-align:center;padding:20px 0;font-size:14px;">할 일이 없어요! 추가해 보세요 😊</div>':items}
  </div>`;
}

    <input class="inp" id="tm_text" placeholder="할 일을 입력하세요"/>
    <div style="display:flex;gap:8px;" id="tm_catbtns">
      ${['업무','개인','취미'].map(c=>`<button type="button" onclick="todoSetCat('${c}')" id="tcatbtn_${c}" style="padding:5px 14px;border-radius:20px;border:2px solid ${CAT[c].bg};background:${'업무'===c?CAT[c].bg:'#fff'};color:${'업무'===c?'#fff':CAT[c].text};font-weight:600;font-size:12px;cursor:pointer;">${c}</button>`).join('')}
    </div>
    <div id="tm_tags" style="display:flex;gap:6px;flex-wrap:wrap;">
      ${HTAGS.map(t=>`<button type="button" onclick="todoSetTag('${t}')" id="ttag_${t.replace(/ /g,'_')}" style="padding:4px 12px;border-radius:20px;border:1.5px solid #d1d5db;background:#f9fafb;color:#555;font-size:12px;cursor:pointer;">${t}</button>`).join('')}
    </div>
    <div>
      <button type="button" onclick="todoToggleTime()" style="font-size:13px;color:#7C3AED;background:none;border:none;cursor:pointer;font-weight:600;padding:0;">📅 날짜/시간 설정 ▼</button>
      <div id="tm_timebox" style="display:none;background:#faf5ff;border-radius:10px;padding:10px;margin-top:8px;" class="col">
        <input type="date" class="inp" id="tm_date" value="${todayStr()}"/>
        <div class="row"><span style="font-size:13px;min-width:50px;">🕐 시간</span>
          <select class="inp" id="tm_hour" style="width:auto;">${HOUR_OPTS.map(h=>`<option value="${h}" ${h===9?'selected':''}>${esc(fmtHour(h))}</option>`).join('')}</select>
          <select class="inp" id="tm_min" style="width:auto;">${[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}">${pad(m)}분</option>`).join('')}</select>
        </div>
      </div>
    </div>
    <div class="row"><span style="font-size:13px;color:#666;white-space:nowrap;">🔔 알림</span>
      <input type="datetime-local" class="inp" id="tm_alarm" style="flex:1;font-size:13px;padding:6px 10px;"/>
    </div>
    <button class="btn btn-primary" onclick="saveTodo()">추가</button>
  </div></div>`);
  window._todoModalState={cat:'업무',tag:'',showTime:false};
};

window.todoSetCat=function(c){
  window._todoModalState.cat=c;
  window._todoModalState.tag='';
  ['업무','개인','취미'].forEach(x=>{
    const b=document.getElementById('tcatbtn_'+x);
    if(b){b.style.background=x===c?CAT[x].bg:'#fff';b.style.color=x===c?'#fff':CAT[x].text;}
  });
  const tags=c==='업무'?HTAGS:OBTAGS;
  const el=document.getElementById('tm_tags');
  if(el)el.innerHTML=tags.map(t=>`<button type="button" onclick="todoSetTag('${t}')" id="ttag_${t.replace(/ /g,'_')}" style="padding:4px 12px;border-radius:20px;border:1.5px solid #d1d5db;background:#f9fafb;color:#555;font-size:12px;cursor:pointer;">${t}</button>`).join('');
};

window.todoSetTag=function(t){
  const prev=window._todoModalState.tag;
  window._todoModalState.tag=prev===t?'':t;
  const allTags=window._todoModalState.cat==='업무'?HTAGS:OBTAGS;
  allTags.forEach(x=>{
    const b=document.getElementById('ttag_'+x.replace(/ /g,'_'));
    if(b){b.style.background=window._todoModalState.tag===x?'#1a1a2e':'#f9fafb';b.style.color=window._todoModalState.tag===x?'#fff':'#555';b.style.fontWeight=window._todoModalState.tag===x?700:400;}
  });
};

window.todoToggleTime=function(){
  window._todoModalState.showTime=!window._todoModalState.showTime;
  const el=document.getElementById('tm_timebox');
  if(el)el.style.display=window._todoModalState.showTime?'flex':'none';
};

window.saveTodo=function(){
  const text=document.getElementById('tm_text')?.value?.trim();
  if(!text){alert('할 일을 입력해주세요!');return;}
  const ms=window._todoModalState;
  const showTime=ms.showTime;
  state.todos.push({
    id:uid(), text, category:ms.cat, tag:ms.tag,
    alarm:document.getElementById('tm_alarm')?.value||'',
    done:false,
    dueDate:showTime?document.getElementById('tm_date')?.value:undefined,
    dueHour:showTime?parseInt(document.getElementById('tm_hour')?.value||9):undefined,
    dueMin:showTime?parseInt(document.getElementById('tm_min')?.value||0):undefined,
    createdAt:new Date().toISOString(),
  });
  closeModal(); setState(()=>{});
};

window.toggleTodo=function(id){
  const t=state.todos.find(x=>x.id===id);
  if(t)t.done=!t.done;
  setState(()=>{});
};

window.deleteTodo=function(id){
  if(!confirm('이 항목을 삭제할까요?'))return;
  state.todos=state.todos.filter(t=>t.id!==id);
  setState(()=>{});
};

// ── 취미 뷰 ──
if(!window._hobbySelDate)window._hobbySelDate=todayStr();

function renderHobby(){
  const sk=hobbyTab==='골프'?'golfDates':hobbyTab==='사진'?'photoDates':'woodworkDates';
  const selDate=window._hobbySelDate;
  const items=state[sk]?.[selDate]||[];

  const tabs=['골프','목공','사진'].map(t=>`<button onclick="setHobbyTab('${t}')" style="flex:1;padding:8px;border-radius:12px;border:2px solid #EAB308;background:${hobbyTab===t?'#EAB308':'#fff'};color:${hobbyTab===t?'#fff':'#A16207'};font-weight:700;font-size:14px;cursor:pointer;">${t==='골프'?'⛳ 골프':t==='목공'?'🪚 목공':'📷 사진'}</button>`).join('');

  let galleryBtns='';
  if(hobbyTab==='사진'){
    galleryBtns=`<div style="display:flex;gap:8px;margin-bottom:12px;">
      <button onclick="setHobbyGallery(false)" class="btn ${!hobbyGallery?'btn-primary':'btn-secondary'}" style="flex:1;">📅 출사 일정</button>
      <button onclick="setHobbyGallery(true)" class="btn ${hobbyGallery?'btn-primary':'btn-secondary'}" style="flex:1;">🖼️ 갤러리</button>
    </div>`;
  }

  let mainContent='';
  if(hobbyTab==='사진'&&hobbyGallery){
    const photos=[...state.photoGallery].reverse();
    mainContent=`<div style="background:#FEFCE8;border-radius:14px;padding:14px;margin-bottom:14px;" class="col">
      <div style="font-weight:700;font-size:14px;color:#A16207;">사진 추가</div>
      <label style="display:block;cursor:pointer;background:#f3f4f6;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;color:#374151;">
        📷 갤러리에서 선택 <input type="file" accept="image/*" onchange="galleryAddPhoto(this)" style="display:none;"/>
      </label>
      <div id="gallery_preview"></div>
      <input class="inp" id="gallery_caption" placeholder="설명 (선택)"/>
      <input type="date" class="inp" id="gallery_date" value="${todayStr()}"/>
      <button class="btn btn-primary" onclick="saveGalleryPhoto()" style="width:100%;">저장</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      ${photos.map(p=>`<div style="border-radius:12px;overflow:hidden;border:1.5px solid #e5e7eb;position:relative;">
        <img src="${p.dataUrl}" style="width:100%;aspect-ratio:1;object-fit:cover;display:block;"/>
        <div style="padding:6px 8px;font-size:12px;color:#555;background:#fff;">
          <div>${esc(p.caption||'제목 없음')}</div>
          <div style="color:#aaa;font-size:11px;">${esc(p.date)}</div>
        </div>
        <button onclick="deleteGalleryPhoto('${p.id}')" style="position:absolute;top:4px;right:4px;background:#ef4444;color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:13px;cursor:pointer;">×</button>
      </div>`).join('')}
    </div>`;
  } else {
    const itemRows=items.map(it=>{
      const dl=it.endHour!=null?durLabel(it.startHour??9,it.startMin??0,it.endHour,it.endMin??0):'';
      return`<div class="card" style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <div style="font-weight:600;font-size:14px;color:#1a1a2e;">${esc(it.title)}</div>
          ${it.startHour!=null?`<div style="font-size:12px;color:#A16207;margin-top:2px;font-weight:600;">🕐 ${esc(fmtTime(it.startHour,it.startMin??0))}${it.endHour!=null?' ~ '+esc(fmtTime(it.endHour,it.endMin??0)):''}${dl?' (⏱ '+esc(dl)+')':''}</div>`:''}
          ${it.note?`<div style="font-size:12px;color:#888;margin-top:2px;">${esc(it.note)}</div>`:''}
          ${it.alarm?`<div style="font-size:11px;color:#888;margin-top:2px;">🔔 ${esc(it.alarm)}</div>`:''}
        </div>
        <button onclick="deleteHobbyItem('${it.id}')" style="background:none;border:none;cursor:pointer;color:#f87171;font-size:18px;">×</button>
      </div>`;
    }).join('');

    mainContent=`<div id="hobbyCalArea">${calHTML(hobbyViewYear,hobbyViewMonth,selDate,false)}</div>
    <div style="margin-top:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1a1a2e;">${selDate}</span>
        <button class="btn btn-primary" onclick="openHobbyAdd()" style="padding:6px 14px;font-size:13px;">+ 추가</button>
      </div>
      ${items.length===0?'<div style="color:#aaa;text-align:center;padding:16px 0;font-size:14px;">일정 없음</div>':itemRows}
    </div>`;
  }

  return`<div style="padding:12px 16px 80px;">
    <div style="display:flex;gap:8px;margin-bottom:14px;">${tabs}</div>
    ${galleryBtns}
    ${mainContent}
  </div>`;
}

window.setHobbyTab=function(t){hobbyTab=t;hobbyGallery=false;render();};
window.setHobbyGallery=function(v){hobbyGallery=v;render();};

window.galleryAddPhoto=function(input){
  readPhotoFiles(input,results=>{
    window._galleryPreview=results[0];
    const el=document.getElementById('gallery_preview');
    if(el&&results[0])el.innerHTML=`<img src="${results[0].dataUrl}" style="width:100%;border-radius:10px;margin:8px 0;"/>`;
  });
};

window.saveGalleryPhoto=function(){
  if(!window._galleryPreview){alert('사진을 선택해주세요!');return;}
  const caption=document.getElementById('gallery_caption')?.value||'';
  const date=document.getElementById('gallery_date')?.value||todayStr();
  state.photoGallery.push({id:uid(),dataUrl:window._galleryPreview.dataUrl,caption,date});
  window._galleryPreview=null;
  setState(()=>{});
};

window.deleteGalleryPhoto=function(id){
  if(!confirm('이 사진을 삭제할까요?'))return;
  state.photoGallery=state.photoGallery.filter(p=>p.id!==id);
  setState(()=>{});
};

window.openHobbyAdd=function(){
  showModal(`
  <div class="modal-header"><span class="modal-title">취미 일정 추가</span><button class="modal-close" onclick="closeModal()">×</button></div>
  <div class="modal-body"><div class="col">
    <input class="inp" id="hm_title" placeholder="제목"/>
    <textarea class="inp" id="hm_note" placeholder="메모"></textarea>
    <div style="background:#FEFCE8;border-radius:10px;border:1.5px solid #e5e7eb;padding:10px;" class="col">
      <div style="font-weight:700;font-size:13px;color:#A16207;">⏰ 시간 설정</div>
      <div class="row"><span style="font-size:13px;min-width:50px;">▶️ 시작</span>
        <select class="inp" id="hm_sh" style="width:auto;">${HOUR_OPTS.map(h=>`<option value="${h}" ${h===9?'selected':''}>${esc(fmtHour(h))}</option>`).join('')}</select>
        <select class="inp" id="hm_sm" style="width:auto;">${[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}">${pad(m)}분</option>`).join('')}</select>
      </div>
      <div class="row"><span style="font-size:13px;min-width:50px;">⏹️ 종료</span>
        <select class="inp" id="hm_eh" style="width:auto;">${HOUR_OPTS.map(h=>`<option value="${h}" ${h===10?'selected':''}>${esc(fmtHour(h))}</option>`).join('')}</select>
        <select class="inp" id="hm_em" style="width:auto;">${[0,10,15,20,30,40,45,50].map(m=>`<option value="${m}">${pad(m)}분</option>`).join('')}</select>
      </div>
    </div>
    <div class="row"><span style="font-size:13px;color:#666;white-space:nowrap;">🔔 알림</span>
      <input type="datetime-local" class="inp" id="hm_alarm" style="flex:1;font-size:13px;padding:6px 10px;"/>
    </div>
    <button class="btn btn-primary" onclick="saveHobbyItem()">저장</button>
  </div></div>`);
};

window.saveHobbyItem=function(){
  const title=document.getElementById('hm_title')?.value?.trim();
  if(!title){alert('제목을 입력해주세요!');return;}
  const sh=parseInt(document.getElementById('hm_sh')?.value||9);
  const sm=parseInt(document.getElementById('hm_sm')?.value||0);
  const eh=parseInt(document.getElementById('hm_eh')?.value||10);
  const em=parseInt(document.getElementById('hm_em')?.value||0);
  const note=document.getElementById('hm_note')?.value||'';
  const alarm=document.getElementById('hm_alarm')?.value||'';
  const sk=hobbyTab==='골프'?'golfDates':hobbyTab==='사진'?'photoDates':'woodworkDates';
  const date=window._hobbySelDate||todayStr();
  if(!state[sk][date])state[sk][date]=[];
  state[sk][date].push({id:uid(),title,note,alarm,startHour:sh,startMin:sm,endHour:eh,endMin:em});
  closeModal(); setState(()=>{});
};

window.deleteHobbyItem=function(id){
  if(!confirm('이 일정을 삭제할까요?'))return;
  const sk=hobbyTab==='골프'?'golfDates':hobbyTab==='사진'?'photoDates':'woodworkDates';
  const date=window._hobbySelDate||todayStr();
  if(state[sk][date])state[sk][date]=state[sk][date].filter(i=>i.id!==id);
  setState(()=>{});
};

// ── 탭 전환 ──
window.setTab=function(tab){
  currentTab=tab;
  render();
};

// ── 렌더링 ──
function render(){
  // 상단 날짜
  document.getElementById('topDate').textContent=new Date().toLocaleDateString('ko-KR',{month:'short',day:'numeric',weekday:'short'});

  // 콘텐츠
  let html='';
  if(currentTab==='home')html=renderHome();
  else if(currentTab==='schedule')html=renderSchedule();
  else if(currentTab==='plan')html=renderPlan();
  else if(currentTab==='todo')html=renderTodo();
  else if(currentTab==='hobby')html=renderHobby();
  document.getElementById('content').innerHTML=html;

  // 하단 탭
  const tabs=[{id:'home',icon:'🏠',label:'홈'},{id:'schedule',icon:'📋',label:'일정'},{id:'plan',icon:'📅',label:'계획'},{id:'todo',icon:'✅',label:'할 일'},{id:'hobby',icon:'⛳',label:'취미'}];
  document.getElementById('bottomnav').innerHTML=tabs.map(t=>`
    <button class="navbtn ${currentTab===t.id?'active':''}" onclick="setTab('${t.id}')">
      <span class="navbtn-icon">${t.icon}</span>
      <span class="navbtn-label">${t.label}</span>
      <div class="navbtn-bar"></div>
    </button>`).join('');
}

// 시작!
render();
</script>
</body>
</html>
